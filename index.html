<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carol Kellogg Lavoie</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: Georgia, 'Times New Roman', serif;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }
      #splash img {
        max-width: 80%;
        max-height: 50vh;
        object-fit: contain;
        margin-bottom: 1.5rem;
        border-radius: 4px;
      }
      #splash h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        text-align: center;
        padding: 0 1rem;
      }
      #splash p {
        font-size: 1.2rem;
        opacity: 0.6;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
        }
      }

      .slideshow {
        position: fixed;
        inset: 0;
        cursor: none;
      }

      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        z-index: 0;
        transition: opacity 2.5s ease-in-out;
      }
      .slide.active {
        opacity: 1;
        z-index: 2;
      }
      .slide.outgoing {
        opacity: 1;
        z-index: 1;
      }

      .slide img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="https://lh3.googleusercontent.com/d/1G6M96itCP7OLS5YRSy9OWJUuhbzCgNif" alt="Carol Kellogg Lavoie" />
      <h2>In Loving Memory</h2>
      <h1>Carol Kellogg Lavoie</h1>
      <p>Tap anywhere to begin</p>
    </div>

    <div class="slideshow" id="slideshow"></div>

    <script src="photos.js"></script>
    <script>
      // ── CONFIGURATION ──
      const CROSSFADE_MS = 2500; // crossfade duration (match CSS transition above)
      const SLIDE_MS = 7000; // how long each photo stays on screen

      // ── Shuffle (Fisher-Yates) ──
      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      const shuffled = shuffle([...PHOTOS]);

      // ── ENGINE ──
      const slideshow = document.getElementById('slideshow');
      let currentIndex = -1;
      let slides = [];

      function buildSlides() {
        slideshow.innerHTML = '';
        slides = [];
        shuffled.forEach((src) => {
          const div = document.createElement('div');
          div.className = 'slide';
          const img = document.createElement('img');
          img.src = src;
          img.onerror = () => {
            div.style.display = 'none';
          };
          div.appendChild(img);
          slideshow.appendChild(div);
          slides.push(div);
        });
      }

      buildSlides();

      function showSlide(index) {
        const prev = currentIndex;

        if (prev >= 0) {
          slides[prev].classList.remove('active');
          slides[prev].classList.add('outgoing');
          setTimeout(
            () => slides[prev].classList.remove('outgoing'),
            CROSSFADE_MS + 100,
          );
        }

        slides[index].classList.add('active');
        currentIndex = index;
      }

      function next() {
        if (currentIndex + 1 >= shuffled.length) {
          const current = shuffled[currentIndex];
          shuffle(shuffled);
          if (shuffled[0] === current && shuffled.length > 1) {
            [shuffled[0], shuffled[shuffled.length - 1]] = [
              shuffled[shuffled.length - 1],
              shuffled[0],
            ];
          }
          buildSlides();
          currentIndex = -1;
        }

        showSlide(currentIndex + 1);
      }

      // ── START ON TAP ──
      if (shuffled.length === 0) {
        document.getElementById('splash').innerHTML =
          '<p style="opacity:1">No photos found. Check photos.js configuration.</p>';
      } else {
        document.getElementById('splash').addEventListener('click', () => {
          // Request fullscreen (requires user gesture)
          const el = document.documentElement;
          const rfs =
            el.requestFullscreen ||
            el.webkitRequestFullscreen ||
            el.msRequestFullscreen;
          if (rfs) {
            rfs.call(el).catch(() => {});
          }

          document.getElementById('splash').style.display = 'none';
          showSlide(0);
          setInterval(next, SLIDE_MS);
        });
      }
    </script>
  </body>
</html>
